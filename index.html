<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Bingo - Final Reliable Fix</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #game-root { width: 100%; max-width: 400px; }
        .num-circle { background: #ffd700; color: #1a1a2e; width: 85px; height: 85px; border-radius: 50%; display: flex; justify-content: center; align-items:center; font-size: 2.2rem; font-weight: 900; margin: 15px auto; border: 4px solid #fff; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .grid-container { background: white; padding: 12px; border-radius: 18px; margin: 0 auto; width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        .grid-cells { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cell { color: white; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
        .selection-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; background: #16213e; padding: 10px; border-radius: 12px; }
        .sel-box { padding: 12px 2px; background: #0f3460; text-align: center; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid #1f4068; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; text-align: center; font-weight: 900; color: #1a1a2e; }
        .bingo-letter { background: #ffd700; padding: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="game-root">
        <div id="content">በመጫን ላይ...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtLHUAuFZNeWDCx2-1W8ZZDa43gRDjLFc",
            authDomain: "my-bingo-app-cdc12.firebaseapp.com",
            databaseURL: "https://my-bingo-app-cdc12-default-rtdb.firebaseio.com",
            projectId: "my-bingo-app-cdc12",
            storageBucket: "my-bingo-app-cdc12.firebasestorage.app",
            messagingSenderId: "793283320707",
            appId: "1:793283320707:web:4a6de806ba7a3048eaf4b6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        // ተጫዋቹን መለየት
        const userId = tg?.initDataUnsafe?.user?.id || "test_user_123";
        const userName = tg?.initDataUnsafe?.user?.first_name || "ተጫዋች";

        // ዳታቤዙን በቋሚነት መከታተል
        db.ref(`players/${userId}`).on("value", (snapshot) => {
            const data = snapshot.val();
            if (data && data.card) {
                // ካርድ ካለው ጨዋታውን አሳይ
                db.ref("gameState").on("value", (gSnap) => {
                    renderGame(gSnap.val() || {}, data.card, data.chosenNum);
                });
            } else {
                // ካርድ ከሌለው መምረጫውን አሳይ
                renderSelection();
            }
        });

        function renderSelection() {
            let boxes = "";
            for (let i = 1; i <= 80; i++) {
                boxes += `<div class="sel-box" onclick="generateMyCard(${i})">${i}</div>`;
            }
            document.getElementById("content").innerHTML = `
                <div style="text-align:center;">
                    <h2 style="color:#ffd700; margin: 15px 0;">ቁጥርዎን ይምረጡ</h2>
                    <div class="selection-grid">${boxes}</div>
                </div>`;
        }

        window.generateMyCard = function(num) {
            document.getElementById("content").innerHTML = "ካርድዎን በማዘጋጀት ላይ...";
            
            let cardNums = [num];
            while(cardNums.length < 24) {
                let r = Math.floor(Math.random() * 80) + 1;
                if(!cardNums.includes(r)) cardNums.push(r);
            }
            cardNums.sort((a, b) => a - b);
            cardNums.splice(12, 0, "FREE");

            // ዳታው መግባቱን አረጋግጦ ማስቀመጥ
            db.ref(`players/${userId}`).set({
                name: userName,
                chosenNum: parseInt(num),
                card: cardNums
            }).catch(err => {
                alert("ስህተት: " + err.message);
                renderSelection();
            });
        };

        function renderGame(gameState, card, chosenNum) {
            const called = gameState.calledNumbers || [];
            let cells = "";

            card.forEach(val => {
                let isHit = called.includes(val) || val === "FREE";
                let isChosen = (val === chosenNum);
                cells += `<div class="cell" style="background:${isHit ? '#e94560' : (isChosen ? '#ffd700' : '#1f4068')}; color:${isChosen && !isHit ? '#1a1a2e' : 'white'}; border:${isChosen ? '2px solid white' : 'none'};">${val}</div>`;
            });

            document.getElementById("content").innerHTML = `
                <div style="text-align:center;">
                    <div class="num-circle">${gameState.currentNum || "..."}</div>
                    <div class="grid-container">
                        <div class="bingo-header">
                            <div class="bingo-letter">B</div><div class="bingo-letter">I</div>
                            <div class="bingo-letter">N</div><div class="bingo-letter">G</div>
                            <div class="bingo-letter">O</div>
                        </div>
                        <div class="grid-cells">${cells}</div>
                    </div>
                    <p style="margin-top:20px; font-weight:bold; font-size:1.2rem;">
                        የመረጡት ቁጥር: <span style="color:#ffd700;">${chosenNum}</span>
                    </p>
                </div>`;
        }
    </script>
</body>
</html>
