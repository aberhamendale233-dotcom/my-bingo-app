<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIN BINGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <button class="rules-btn">Rules</button>
        </header>

        <main class="main-content">
            <div class="welcome-section">
                <p class="welcome-text">Welcome to</p>
                <h1 class="main-logo">WIN BINGO</h1>
            </div>

            <div class="stake-card">
                <p class="stake-title">CHOOSE YOUR STAKE</p>
                <div class="glow-divider"></div>
                
                <button id="play-btn" class="play-button">
                    <span class="icon-play">▶</span> PLAY 10
                </button>

                <div class="wallet-section">
                    <p class="wallet-label">WALLET BALANCE</p>
                    <h2 id="balance" class="balance-amount">6</h2>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-icon">🎮</span>
                <span class="nav-text">GAME</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">SCORES</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🕒</span>
                <span class="nav-text">HISTORY</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">💼</span>
                <span class="nav-text">WALLET</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👤</span>
                <span class="nav-text">PROFILE</span>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
