<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Game</title>

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="game-root">

    <h2>🎰 BINGO LIVE GAME</h2>

    <!-- NUMBER DISPLAY -->
    <div class="number-display-box">
        <div class="bingo-ball-call" id="currentNumber">
            --
        </div>
    </div>

    <!-- STATUS -->
    <div class="status-box" id="statusBox">
        Waiting for game...
    </div>

    <!-- BUTTON -->
    <button onclick="generateCard()">🎟️ Get Card</button>

    <!-- CARD -->
    <div class="bingo-card-5x5" id="cardBox"></div>

</div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= TELEGRAM ================= */
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.expand(); tg.ready(); }

const user = tg?.initDataUnsafe?.user || {
    id: "guest_" + Math.floor(Math.random() * 9999),
    first_name: "Player"
};

let userCard = [];

/* ================= LIVE GAME LISTENER ================= */
db.ref("gameState").on("value", (snap) => {
    const data = snap.val();

    if (!data) return;

    document.getElementById("currentNumber").innerText =
        data.currentNumber || "--";

    document.getElementById("statusBox").innerText =
        "Status: " + (data.status || "WAITING");

    if (data.winner) {
        document.getElementById("statusBox").innerText =
            "🏆 Winner: " + data.winner;
    }

    if (userCard.length > 0) {
        renderCard(userCard, data.calledNumbers || []);
    }
});

/* ================= GENERATE CARD ================= */
function generateCard() {
    let card = [];

    for (let i = 1; i <= 25; i++) {
        card.push(Math.floor(Math.random() * 75) + 1);
    }

    userCard = card;

    db.ref("players/" + user.id).set({
        name: user.first_name,
        card: card
    });

    renderCard(card, []);
}

/* ================= RENDER CARD ================= */
function renderCard(card, called) {
    let html = `<div class="grid-container">`;

    card.forEach(num => {
        let active = called.includes(num);

        html += `
            <div class="cell ${active ? 'active' : ''}">
                ${num}
            </div>
        `;
    });

    html += `</div>`;

    document.getElementById("cardBox").innerHTML = html;
}

/* ================= CHECK WIN ================= */
function checkWin(card, called) {
    return card.every(n => called.includes(n));
}
</script>

</body>
</html>
