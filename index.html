<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Win Bingo - Manual Selection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        #game-root { width: 100%; max-width: 400px; position: relative; }
        
        .num-circle { background: #ffd700; color: #1a1a2e; width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items:center; font-size: 2rem; font-weight: 900; margin: 15px auto; border: 4px solid #fff; }
        
        .grid-container { background: white; padding: 12px; border-radius: 18px; margin: 0 auto; width: 90%; }
        .grid-cells { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .cell { color: white; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        
        /* ቁጥር መምረጫ ስክሪን */
        .selection-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; background: #16213e; padding: 10px; border-radius: 10px; max-height: 300px; overflow-y: auto; }
        .sel-box { padding: 8px 2px; background: #0f3460; text-align: center; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .sel-box.active { background: #ffd700; color: #1a1a2e; font-weight: bold; }
        
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 8px; text-align: center; font-weight: 900; color: #1a1a2e; }
        .bingo-letter { background: #ffd700; padding: 5px 0; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="game-root">
        <div id="content"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCtLHUAuFZNeWDCx2-1W8ZZDa43gRDjLFc",
            authDomain: "my-bingo-app-cdc12.firebaseapp.com",
            databaseURL: "https://my-bingo-app-cdc12-default-rtdb.firebaseio.com",
            projectId: "my-bingo-app-cdc12",
            storageBucket: "my-bingo-app-cdc12.firebasestorage.app",
            messagingSenderId: "793283320707",
            appId: "1:793283320707:web:4a6de806ba7a3048eaf4b6"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const user = tg?.initDataUnsafe?.user || { id: "user_test", first_name: "ተጫዋች" };
        let selectedNumbers = [];

        // ጨዋታውን መከታተል
        db.ref("gameState").on("value", (snap) => {
            const data = snap.val();
            if (data && data.status === "PLAYING" && selectedNumbers.length === 24) {
                renderGame(data);
            } else if (selectedNumbers.length < 24) {
                renderSelection();
            }
        });

        // ቁጥር መምረጫ UI
        function renderSelection() {
            let boxes = "";
            for (let i = 1; i <= 80; i++) {
                const isActive = selectedNumbers.includes(i);
                boxes += `<div class="sel-box ${isActive?'active':''}" onclick="toggleNum(${i})">${i}</div>`;
            }
            document.getElementById("content").innerHTML = `
                <div style="text-align:center;">
                    <h3 style="color:#ffd700;">24 ቁጥሮችን ይምረጡ (${selectedNumbers.length}/24)</h3>
                    <div class="selection-grid">${boxes}</div>
                    <button id="start-btn" onclick="confirmCard()" style="margin-top:20px; padding:15px; width:100%; border-radius:10px; background:${selectedNumbers.length===24?'#ffd700':'#555'}; border:none; font-weight:bold;" ${selectedNumbers.length!==24?'disabled':''}>ካርዱን አረጋግጥ</button>
                </div>`;
        }

        window.toggleNum = function(n) {
            if (selectedNumbers.includes(n)) {
                selectedNumbers = selectedNumbers.filter(x => x !== n);
            } else {
                if (selectedNumbers.length < 24) selectedNumbers.push(n);
            }
            renderSelection();
        };

        window.confirmCard = function() {
            selectedNumbers.sort((a, b) => a - b);
            // FREE space መጨመር
            let finalCard = [...selectedNumbers];
            finalCard.splice(12, 0, "FREE"); 
            
            db.ref(`players/${user.id}`).set({ 
                name: user.first_name, 
                card: finalCard 
            }).then(() => {
                alert("ካርድዎ ተመዝግቧል! ጨዋታው ሲጀመር ይጠብቁ።");
            });
        };

        function renderGame(data) {
            const root = document.getElementById("content");
            let cells = "";
            const called = data.calledNumbers || [];
            
            db.ref(`players/${user.id}/card`).once("value", (snap) => {
                const card = snap.val() || [];
                if (card.length === 0) return;

                for(let i=0; i<25; i++) {
                    let val = card[i];
                    let hit = called.includes(val) || val === "FREE";
                    cells += `<div class="cell" style="background:${hit?'#e94560':'#1f4068'};">${val}</div>`;
                }

                root.innerHTML = `
                    <div style="text-align:center;">
                        <div class="num-circle">${data.currentNum || "..." }</div>
                        <div class="grid-container">
                            <div class="bingo-header">
                                <div class="bingo-letter">B</div><div class="bingo-letter">I</div>
                                <div class="bingo-letter">N</div><div class="bingo-letter">G</div>
                                <div class="bingo-letter">O</div>
                            </div>
                            <div class="grid-cells">${cells}</div>
                        </div>
                    </div>`;
            });
        }
    </script>
</body>
</html>
