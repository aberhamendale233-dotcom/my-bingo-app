<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIL BINGO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- የላይኛው ክፍል (Header) -->
        <header>
            <h1 class="logo">DIL BINGO</h1>
            <button class="rules-btn">Rules</button>
        </header>

        <!-- ዋናው የጨዋታ መግቢያ (Hero Section) -->
        <main class="main-content">
            <div class="welcome-text">
                <p>Welcome to</p>
                <h2 class="title">DIL BINGO</h2>
            </div>

            <div class="stake-card">
                <p class="stake-label">CHOOSE YOUR STAKE</p>
                <div class="divider"></div>
                
                <button id="play-btn" class="play-button">
                    <span class="play-icon">▶</span> PLAY 10
                </button>

                <div class="wallet-info">
                    <p>WALLET BALANCE</p>
                    <h3 id="balance">6</h3>
                </div>
            </div>
        </main>

        <!-- የታችኛው ሜኑ (Bottom Navigation) -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <div class="icon">🎮</div>
                <span>GAME</span>
            </div>
            <div class="nav-item">
                <div class="icon">🏆</div>
                <span>SCORES</span>
            </div>
            <div class="nav-item">
                <div class="icon">🕒</div>
                <span>HISTORY</span>
            </div>
            <div class="nav-item">
                <div class="icon">💼</div>
                <span>WALLET</span>
            </div>
            <div class="nav-item">
                <div class="icon">👤</div>
                <span>PROFILE</span>
            </div>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
