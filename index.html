<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Bingo</title>

    <!-- STYLE -->
    <link rel="stylesheet" href="style.css">

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- TELEGRAM -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

<div id="game-root">

    <h2>🎰 MULTIPLAYER BINGO</h2>

    <!-- TIMER -->
    <div class="status-box" id="statusBox">Loading...</div>

    <!-- NUMBER DISPLAY -->
    <div class="number-display-box">
        <div class="bingo-ball-call" id="currentNumber">--</div>
    </div>

    <!-- TIMER DISPLAY -->
    <h3 id="timer">30</h3>

    <!-- CARD SELECTION -->
    <div id="cardSelect">
        <h3>Select Cards (1–5)</h3>

        <button onclick="joinGame(1)">1 Card</button>
        <button onclick="joinGame(2)">2 Cards</button>
        <button onclick="joinGame(3)">3 Cards</button>
        <button onclick="joinGame(4)">4 Cards</button>
        <button onclick="joinGame(5)">5 Cards</button>
    </div>

    <!-- PLAYER CARDS -->
    <div id="cardsContainer"></div>

</div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT.firebaseio.com",
    projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= TELEGRAM ================= */
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.expand(); tg.ready(); }

const user = tg?.initDataUnsafe?.user || {
    id: "guest_" + Math.floor(Math.random() * 9999),
    first_name: "Player"
};

let myCards = [];

/* ================= LIVE GAME ================= */
db.ref("gameState").on("value", (snap) => {
    const data = snap.val();
    if (!data) return;

    document.getElementById("currentNumber").innerText =
        data.currentNumber || "--";

    document.getElementById("timer").innerText =
        data.timer || 0;

    document.getElementById("statusBox").innerText =
        "Status: " + data.status;

    if (data.status === "WAITING") {
        document.getElementById("cardSelect").style.display = "block";
    } else {
        document.getElementById("cardSelect").style.display = "none";
    }

    if (myCards.length > 0) {
        renderCards(myCards, data.calledNumbers || []);
    }
});

/* ================= JOIN GAME ================= */
function joinGame(count) {

    fetch("http://localhost:3000/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            userId: user.id,
            cards: count,
            name: user.first_name
        })
    })
    .then(res => res.json())
    .then(data => {
        myCards = data.cards;
        renderCards(myCards, []);
    });
}

/* ================= RENDER CARDS ================= */
function renderCards(cards, called) {
    let html = "";

    cards.forEach(card => {

        html += `<div class="bingo-card-5x5"><div class="grid-container">`;

        card.forEach(num => {
            let active = called.includes(num);

            html += `
                <div class="cell ${active ? 'active' : ''}">
                    ${num}
                </div>
            `;
        });

        html += `</div></div>`;
    });

    document.getElementById("cardsContainer").innerHTML = html;
}

</script>

</body>
</html>
